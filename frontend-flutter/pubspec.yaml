name: floodsos
description: FloodSOS Complete - Emergency Response System
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- TIỆN ÍCH ---
  intl: ^0.19.0
  path: ^1.9.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  uuid: ^4.5.1

  # --- MẠNG (chỉ dùng dio — loại bỏ http để thống nhất) ---
  dio: ^5.4.1
  socket_io_client: ^3.0.0

  # --- CẤU HÌNH MÔI TRƯỜNG ---
  flutter_dotenv: ^5.1.0

  # --- UI ---
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  timeline_tile: ^2.0.0

  # --- MAP ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  location: ^7.0.0
  webview_flutter: ^4.7.0

  # --- FIREBASE & DATA ---
  sqflite: ^2.3.2
  provider: ^6.1.2
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.1
  firebase_messaging: ^15.0.1

  # --- MEDIA ---
  audioplayers: ^6.0.0
  record: ^5.2.0
  vibration: ^3.1.8
  flutter_tts: ^4.2.5
  cached_network_image: ^3.4.1
  logger: ^2.7.0
  battery_plus: ^7.0.0
  device_info_plus: ^12.3.0
  shared_preferences: ^2.5.5
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# 🟢 FIX LỖI "Missing implementation RecordLinux":
# Ép buộc dùng phiên bản record_linux mới nhất để tránh lỗi build trên Windows
dependency_overrides:
  record_linux: ^1.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env